<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title id="pageTitle">Săn deal mã giảm giá Shopee - Thuận</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ee4d2d;
            --primary-dark: #d73211;
            --bg: #f5f5f5;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 6px solid var(--primary);
        }
        .header {
            padding: 25px; text-align: center;
            background: linear-gradient(to bottom, #fff1ed, #ffffff);
        }
        .header h1 { color: var(--primary); margin: 0; font-size: 22px; }
        .header p { color: #666; margin-top: 10px; font-size: 14px; }
        .content { padding: 20px; }
        input {
            width: 100%; padding: 15px;
            border: 2px solid #eee; border-radius: 12px;
            box-sizing: border-box; outline: none;
            font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        .btn-primary {
            width: 100%; background: var(--primary);
            color: white; border: none;
            padding: 15px; border-radius: 12px;
            font-weight: bold; font-size: 16px;
            margin-top: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary:active { transform: scale(0.98); }
        .result-card {
            display: none; margin-top: 20px;
            padding: 15px; background: #fff5f1;
            border: 1px dashed var(--primary);
            border-radius: 12px; word-break: break-all;
        }
        .result-card.show { display: block; animation: fadeIn 0.5s; }
        .final-link { color: #333; font-size: 13px; display: block; margin-bottom: 10px; }
        .btn-copy {
            background: #2ecc71; color: white; border: none;
            padding: 10px; border-radius: 8px;
            width: 100%; cursor: pointer; font-weight: bold;
        }
        .footer {
            text-align: center; padding: 20px;
            font-size: 12px; color: #999;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="pageHeading">VOUCHER 25% FACEBOOK</h1>
        <p>Chào mừng <strong>Thuận</strong> — Công cụ tạo link sạch</p>
    </div>

    <div class="content">
        <input type="text" id="linkInput" placeholder="Dán link sản phẩm Shopee vào đây...">
        <button class="btn-primary" onclick="processLink()">
            <i class="fas fa-magic"></i> NHẬN MÃ GIẢM GIÁ
        </button>

        <div id="resultArea" class="result-card">
            <span style="color: #ee4d2d; font-weight: bold; font-size: 12px;">LINK ĐÃ CHUYỂN ĐỔI:</span>
            <span id="finalLink" class="final-link"></span>
            <button class="btn-copy" onclick="copyLink()">
                <i class="fas fa-copy"></i> SAO CHÉP LINK
            </button>
        </div>
    </div>

    <div class="footer">
        ID Affiliate: 17332200161<br>
        Hệ thống tự động chống lỗi "Oops"
    </div>
</div>

<script>
    function processLink() {
        let rawUrl = document.getElementById('linkInput').value.trim();
        if (!rawUrl) {
            alert("Bạn hãy dán link Shopee vào nhé!");
            return;
        }

        // Bước 1: Loại bỏ các mã theo dõi rác để tránh lỗi Oops
        let cleanUrl = rawUrl.split('?')[0];

        // Bước 2: Gắn ID của Thuận
        const myId = "17332200161";
        
        // Bước 3: Tạo link cấu trúc an_redir chuẩn nhất hiện nay
        const encoded = encodeURIComponent(cleanUrl);
        const final = `https://s.shopee.vn/an_redir?origin_link=${encoded}&affiliate_id=${myId}&sub_id=FB_Voucher&deep_and_deferred=1`;

        // Bước 4: Hiển thị
        document.getElementById('finalLink').innerText = final;
        document.getElementById('resultArea').classList.add('show');
    }

    function copyLink() {
        const text = document.getElementById('finalLink').innerText;
        const elem = document.createElement('textarea');
        elem.value = text;
        document.body.appendChild(elem);
        elem.select();
        document.execCommand('copy');
        document.body.removeChild(elem);
        alert("Đã sao chép! Hãy dán vào Facebook để mã sáng lên.");
    }
</script>

</body>
</html>
